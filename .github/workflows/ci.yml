name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  php:
    name: PHP Pipeline
    uses: ./.github/workflows/reusable-php-pipeline.yml
    with:
      working-directory: examples/php
      coverage-threshold: 80
      run-build: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit

  python:
    name: Python Pipeline
    uses: ./.github/workflows/reusable-python-pipeline.yml
    with:
      working-directory: examples/python
      coverage-threshold: 80
      run-build: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit
