name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read
  deployments: write

jobs:
  deploy-staging:
    name: Deploy / Staging
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: staging
      url: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy with Docker Compose
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_ENV: staging
        run: ./scripts/ci/deploy.sh staging
      - name: Smoke tests
        run: ./scripts/ci/smoke.sh staging

  deploy-production:
    name: Deploy / Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run database migrations
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: ./scripts/ci/migrate.sh production
      - name: Rolling deploy
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_STRATEGY: rolling
        run: ./scripts/ci/deploy.sh production
      - name: Smoke tests
        run: ./scripts/ci/smoke.sh production
      - name: Upload deploy metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata-${{ github.sha }}
          path: build/deploy-metadata.json
          if-no-files-found: ignore

  notify-failure:
    name: Deploy / Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: ./scripts/ci/notify-failure.sh "Deploy pipeline failed"
