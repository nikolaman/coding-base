name: Setup Python
description: Устанавливает Python и зависимости с кэшированием pip

inputs:
  python-version:
    description: Версия Python
    required: false
    default: "3.12"
  working-directory:
    description: Каталог с pyproject.toml
    required: true

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          ${{ inputs.working-directory }}/requirements-dev.txt
          ${{ inputs.working-directory }}/requirements.txt

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .
